<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo-Acuña, Nicolás</title>
  <script src="script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,400;0,500;0,700;1,500&family=Ubuntu+Condensed:wght@0,500" rel="stylesheet">
  <style>
    body {
      background-color: #fff7ed;
      color: #100c08;
      font-size: 14px;
      font-weight: 500;
      font-family: Ubuntu, sans-serif;
      margin: 0;
    }

    a {
      color: #009999;
      font-family: 'Ubuntu Condensed', sans-serif;
      text-decoration: none;
    }

    #header,
    #body {
      margin-left: 300px;
      padding: 10px;
    }

    #title-column,
    #degree-column {
      flex: 1;
      background-color: transparent;
      padding: 5px;
      border-radius: 8px;
    }

    .info-header,
    .info-body {
      position: relative;
      width: 850px;
      margin: 5px auto;
      margin-top: 30px;
    }

    .click-title {
      background-color: transparent;
      color: #f53e3e;
      padding: 5px;
      cursor: pointer;
      font-size: 18px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 5px;
    }

    .click-hidden {
      display: none;
      background-color: transparent;
      padding: 5px;
      border: 1px solid transparent;
      margin-top: 5px;
    }

    .chevron {
      margin-left: 8px;
      fill: #f53e3e;
      transition: transform 0.3s ease;
    }

  </style>
</head>

<body>

  <div id="header">
    <div class="info-header" style="text-align: center; font-size: 42px; font-weight: bold; color: #f53e3e;">NICOLÁS BRAVO ACUÑA</div>

    <div class="info-header" style="display: flex; width: 550px; font-size: 12px; gap: 5px; margin-top: 5px;">
      <div id="title-column"></div>
      <div id="degree-column"></div>
    </div>

    <div class="info-header" style="margin-top: 5px"><hr style="width:80%; width:600px; border-top:2px solid #100c08;"></div>
  </div>

  <div id="body">
    <div class="info-body">
      <div class="click-title">
        <span>Educación</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewbox="0 0 20 20"><path d="M5 7l5 5 5-5z"/></path></svg>
      </div>
      <div class="click-hidden">
    <div id="education-container"></div></div>

    <div class="info-body">
      <div class="click-title">
        <span>Actividades de divulgación</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewbox="0 0 20 20"><path d="M5 7l5 5 5-5z"/></path></svg>
      </div>
      <div class="click-hidden">
    <div id="outreach-container"></div></div>

    <div class="info-body">
      <div class="click-title">
        <span>Artículos científicos</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewbox="0 0 20 20"><path d="M5 7l5 5 5-5z"/></path></svg>
      </div>
      <div class="click-hidden">
    <div id="papers-container"></div></div>

    <div class="info-body">
      <div class="click-title">
        <span>Pósteres científicos</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewbox="0 0 20 20"><path d="M5 7l5 5 5-5z"/></path></svg>
      </div>
      <div class="click-hidden">
    <div id="posters-container"></div></div>

    </div>
  </div>

</body>
</html>
