<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo-Acuña, Nicolás</title>
  <script src="script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,400;0,500;0,700;1,500&family=Ubuntu+Condensed" rel="stylesheet">
  <style>
    body {
      background-color: #fff7ed;
      color: #100c08;
      font-size: 14px;
      font-weight: 500;
      font-family: Ubuntu, sans-serif;
    }

    a {
      color: #009999;
      font-family: 'Ubuntu Condensed', sans-serif;
      text-decoration: none;
    }

    #header,
    #body {
      margin-left: 300px;
      padding: 10px;
    }

    #title-column,
    #degree-column {
      flex: 1;
      width: 250px;
    }

    .info-header,
    .info-body {
      position: relative;
      width: 850px;
      margin: 5px auto;
      margin-top: 30px;
    }

    .click-title {
      color: #f53e3e;
      padding: 5px;
      cursor: pointer;
      font-size: 18px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .click-hidden {
      display: none;
      padding: 5px;
      margin-top: 5px;
    }

    .chevron {
      margin-left: 5px;
      transition: transform 0.3s ease;
      width: 20px;
      height: 20px;
      viewbox: 0 0 20 20;
      xmlns: http://www.w3.org/2000/svg;
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 150px !important;
      }

      .sidebar #picture {
        width: 125px;
        height: 125px;
      }

      #header,
      #body {
        margin-left: 150px;
      }
    }

  </style>
</head>

<body>
  <div id="header">

    <div class="info-header" style="text-align: center; font-size: 42px; font-weight: bold; color: #f53e3e;">NICOLÁS BRAVO ACUÑA</div>

    <div class="info-header" style="text-align: center; font-size: 10px; margin-top: 5px;">Miembro de la Sociedad Chilena de Bioinformática desde 2025</div>

    <div class="info-header" style="display: grid; grid-template-columns: 20% 30% 30% 20%; font-size: 12px; margin-top: 5px;">
      <div></div>
      <div id="title-column"></div>
      <div id="degree-column"></div>
      <div></div>
    </div>

    <div class="info-header" style="margin-top: 10px"><hr style="width:80%; width:600px; border-top:2px solid #100c08;"></div>
  </div>

  <div id="body">

    <div class="info-body">
      <div class="click-title">
        <span>Educación</span>
        <svg class="chevron"><path d="M5 7 L10 12 L15 7" stroke="#f53e3e" stroke-width="2" fill="none"/></svg>
      </div>
      <div class="click-hidden">
      <div id="education-container"></div></div>

    <div class="info-body">
      <div class="click-title">
        <span>Actividades de divulgación</span>
        <svg class="chevron"><path d="M5 7 L10 12 L15 7" stroke="#f53e3e" stroke-width="2" fill="none"/></svg>
      </div>
      <div class="click-hidden">
      <div id="outreach-container"></div></div>

    <div class="info-body">
      <div class="click-title">
        <span>Artículos científicos</span>
        <svg class="chevron"><path d="M5 7 L10 12 L15 7" stroke="#f53e3e" stroke-width="2" fill="none"/></svg>
      </div>
      <div class="click-hidden">
      <div id="papers-container"></div></div>

    <div class="info-body">
      <div class="click-title">
        <span>Pósteres científicos</span>
        <svg class="chevron"><path d="M5 7 L10 12 L15 7" stroke="#f53e3e" stroke-width="2" fill="none"/></svg>
      </div>
      <div class="click-hidden">
      <div id="posters-container"></div></div>

    </div>
  </div>

</body>
</html>
